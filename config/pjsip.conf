[global]
type=global
user_agent=Dograh-Asterisk-Gateway

; Network Transports
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; Trunk Registration to Vobiz
[vobiz-reg]
type=registration
transport=transport-udp
outbound_auth=vobiz-auth
server_uri=sip:YOUR_VOBIZ_DOMAIN
client_uri=sip:YOUR_VOBIZ_USERNAME@YOUR_VOBIZ_DOMAIN
retry_interval=60

; Authentication Credentials
[vobiz-auth]
type=auth
auth_type=userpass
username=YOUR_VOBIZ_USERNAME
password=YOUR_VOBIZ_PASSWORD

; Trunk Endpoint
[vobiz-trunk]
type=endpoint
transport=transport-udp
context=from-external
disallow=all
allow=ulaw
outbound_auth=vobiz-auth
aors=vobiz-aor

; Address of Record for Vobiz routing
[vobiz-aor]
type=aor
contact=sip:YOUR_VOBIZ_DOMAIN
